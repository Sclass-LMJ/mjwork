<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메뉴판 | Menu Board</title>
  <meta name="description" content="다국어 식당 메뉴판 - Multilingual Restaurant Menu Board">

  <!-- Google Fonts: Noto Sans (KR, JP, SC) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon & 홈화면 아이콘 -->
  <link rel="icon" href="신설오름메뉴판로고.png" type="image/png">
  <link rel="apple-touch-icon" href="신설오름메뉴판로고.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d35400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="신설오름 메뉴판">
</head>
<body>

  <!-- ============================
       Page: Menu Display
       ============================ -->
  <section id="page-menu" class="page active"></section>

  <!-- ============================
       Page 3: Admin Dashboard
       ============================ -->
  <section id="page-admin" class="page"></section>

  <!-- ============================
       Login Modal
       ============================ -->
  <div class="modal hidden" id="modal-login">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2>🔐 관리자 로그인</h2>
      <div class="login-form">
        <input type="text" id="login-id" class="login-input" placeholder="아이디" autocomplete="off">
        <input type="password" id="login-pw" class="login-input" placeholder="비밀번호" autocomplete="off">
        <div class="login-error" id="login-error"></div>
        <div class="login-actions">
          <button class="btn-secondary" id="btn-login-cancel">취소</button>
          <button class="btn-primary" id="btn-login">로그인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Menu Detail Modal -->
  <div class="modal hidden" id="modal-detail"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
