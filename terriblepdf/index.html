<!DOCTYPE html>
<html lang="ko">

<head>
    <!-- 문서 인코딩을 UTF-8로 설정 (한글 지원) -->
    <meta charset="UTF-8">
    
    <!-- 모바일 기기에서 반응형 디자인을 위한 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 브라우저 탭에 표시될 제목 -->
    <title>PDF OCR 판독기</title>
    
    <!-- 외부 CSS 파일 연결 (디자인 스타일) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- PDF.js 라이브러리: PDF 파일을 읽고 처리하는 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Tesseract.js 라이브러리: 이미지에서 텍스트를 인식하는 OCR 라이브러리 -->
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
</head>

<body>
    <!-- 메인 컨테이너: 전체 내용을 감싸는 영역 -->
    <div class="container">
        <!-- 카드: 실제 내용이 들어가는 흰색 박스 -->
        <div class="card">
            
            <!-- ========== 헤더 영역 ========== -->
            <!-- 앱 제목과 설명을 표시하는 영역 -->
            <div class="header">
                <h1>📄 PDF OCR 판독기 <span class="badge">Pro</span></h1>
                <p>모든 종류의 PDF에서 텍스트를 추출합니다 (이미지 PDF도 가능!)</p>
            </div>

            <!-- ========== 파일 업로드 영역 ========== -->
            <!-- 사용자가 PDF 파일을 선택하는 영역 -->
            <div class="upload-section">
                <!-- 파일 선택 input (숨김 상태로 유지, 버튼 클릭시 작동) -->
                <!-- multiple: 여러 파일 선택 가능 -->
                <!-- accept: PDF 파일만 선택 가능 -->
                <input type="file" id="fileInput" accept=".pdf,application/pdf" multiple style="display: none;">
                
                <!-- 파일 업로드 버튼 (클릭하면 파일 선택창이 열림) -->
                <button id="uploadButton" class="upload-button">
                    <!-- SVG 아이콘: 업로드 화살표 모양 -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    PDF 파일 업로드 (다중 선택 가능)
                </button>
                
                <!-- 업로드 안내 문구 -->
                <p class="upload-hint">지원 형식: PDF (텍스트 기반 + 이미지 기반 모두 지원) | 여러 파일 선택 가능</p>
            </div>

            <!-- ========== OCR 모드 선택 영역 ========== -->
            <!-- 파일 업로드 후 표시되는 모드 선택 화면 (초기엔 숨김 상태) -->
            <div id="ocrModeSection" class="ocr-mode-section" style="display: none;">
                <div class="mode-card">
                    <!-- 모드 선택 헤더 -->
                    <div class="mode-header">
                        <!-- SVG 아이콘: 체크 표시 -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        <h3>처리 모드 선택</h3>
                    </div>
                    
                    <!-- 두 가지 모드 선택 버튼 -->
                    <div class="mode-options">
                        <!-- 빠른 추출 모드: 텍스트 기반 PDF에 적합 (기본 선택) -->
                        <button id="textModeBtn" class="mode-button active">
                            <div class="mode-icon">⚡</div>
                            <div class="mode-info">
                                <div class="mode-title">빠른 추출</div>
                                <div class="mode-desc">텍스트 기반 PDF (빠름)</div>
                            </div>
                        </button>
                        
                        <!-- OCR 추출 모드: 이미지/스캔 PDF에 적합 -->
                        <button id="ocrModeBtn" class="mode-button">
                            <div class="mode-icon">🔍</div>
                            <div class="mode-info">
                                <div class="mode-title">OCR 추출</div>
                                <div class="mode-desc">이미지 PDF 인식 (느림)</div>
                            </div>
                        </button>
                    </div>
                    
                    <!-- 처리 시작 버튼 -->
                    <button id="startProcessBtn" class="start-button">처리 시작</button>
                </div>
            </div>

            <!-- ========== 로딩 상태 표시 영역 ========== -->
            <!-- PDF 파일 처리 중 표시되는 로딩 화면 (초기엔 숨김 상태) -->
            <div id="loadingContainer" class="loading-container" style="display: none;">
                <!-- 회전하는 로딩 스피너 -->
                <div class="spinner"></div>
                
                <!-- 현재 처리 중인 파일 정보 텍스트 -->
                <p id="loadingText">PDF를 처리 중입니다...</p>
                
                <!-- 진행률 표시 바 -->
                <div class="progress-container">
                    <!-- 진행률 바 배경 -->
                    <div class="progress-bar">
                        <!-- 실제 진행률을 표시하는 색상 바 (width가 0%에서 100%로 변함) -->
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <!-- 진행률 퍼센트 숫자 표시 -->
                    <p id="progressText" class="progress-text">0%</p>
                </div>
            </div>

            <!-- ========== 추출된 텍스트 결과 영역 ========== -->
            <!-- PDF 처리 완료 후 결과를 표시하는 영역 (초기엔 숨김 상태) -->
            <div id="resultContainer" class="result-container" style="display: none;">
                
                <!-- 탭 헤더: 전체선택 버튼과 파일 탭들 -->
                <div class="tabs-header">
                    <!-- 전체선택 버튼 -->
                    <button id="selectAllBtn" class="select-all-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        전체선택
                    </button>
                    
                    <!-- 파일 탭 영역: 여러 파일을 업로드한 경우 탭으로 표시 -->
                    <!-- JavaScript가 동적으로 탭 버튼을 생성하여 추가함 -->
                    <div id="fileTabs" class="file-tabs"></div>
                </div>
                
                <!-- 결과 내용 표시 영역 -->
                <div id="tabContent" class="tab-content">
                    <!-- 결과 헤더: 파일 이름 표시 -->
                    <div class="result-header">
                        <!-- SVG 아이콘: 문서 아이콘 -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <!-- 현재 선택된 파일의 이름 -->
                        <h2 id="fileName"></h2>
                    </div>
                    
                    <!-- 추출된 텍스트 내용 표시 영역 (스크롤 가능) -->
                    <div class="text-output" id="textOutput"></div>
                    
                    <!-- 파일 제어 버튼 그룹 -->
                    <div class="button-group">
                        <!-- 텍스트 복사 버튼 (클립보드에 복사) -->
                        <button id="copyButton" class="action-button copy-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            텍스트 복사
                        </button>
                        
                        <!-- 개별 파일 다운로드 버튼 -->
                        <button id="downloadButton" class="action-button download-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            현재 파일 다운로드
                        </button>
                    </div>
                    
                    <!-- 선택한 파일 다운로드 버튼 -->
                    <button id="downloadSelectedButton" class="bulk-button selected-button" style="width: 100%; margin-top: 12px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        선택한 파일 다운로드 (<span id="selectedCount">0</span>개)
                    </button>
                </div>
            </div>

            <!-- ========== 에러 메시지 영역 ========== -->
            <!-- 오류 발생시 표시되는 영역 (초기엔 숨김 상태) -->
            <div id="errorContainer" class="error-container" style="display: none;"></div>
        </div>
    </div>

    <!-- JavaScript 파일 연결 (모든 기능 구현) -->
    <script src="script.js"></script>
</body>

</html>
